name: Oracle Instance Creator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r oracle-freetier-instance-creation-main/requirements.txt
        
      - name: Create OCI config and SSH key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/id_rsa.pub
          printf "[DEFAULT]\nuser=${{ secrets.OCI_USER_OCID }}\nfingerprint=${{ secrets.OCI_FINGERPRINT }}\ntenancy=${{ secrets.OCI_TENANCY_OCID }}\nregion=${{ secrets.OCI_REGION }}\nkey_file=/home/runner/.oci/oci_api_key.pem\n" > ~/.oci/config
          cat ~/.oci/config

      - name: Update oci.env
        run: |
          sed -i "s|OCI_CONFIG=.*|OCI_CONFIG=/home/runner/.oci/config|" oracle-freetier-instance-creation-main/oci.env
          sed -i "s|SSH_AUTHORIZED_KEYS_FILE=.*|SSH_AUTHORIZED_KEYS_FILE=/home/runner/id_rsa.pub|" oracle-freetier-instance-creation-main/oci.env

      - name: Run script
        run: python oracle-freetier-instance-creation-main/main.py
