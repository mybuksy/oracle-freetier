name: Oracle Instance Creator2

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r oracle-freetier-instance-creation-main/requirements.txt

      - name: Create OCI config and SSH key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          echo "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "$SSH_PUBLIC_KEY" > /home/runner/id_rsa.pub
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=$OCI_USER_OCID" >> ~/.oci/config
          echo "fingerprint=$OCI_FINGERPRINT" >> ~/.oci/config
          echo "tenancy=$OCI_TENANCY_OCID" >> ~/.oci/config
          echo "region=$OCI_REGION" >> ~/.oci/config
          echo "key_file=/home/runner/.oci/oci_api_key.pem" >> ~/.oci/config

      - name: Update oci.env
        run: |
          echo "OCI_CONFIG=/home/runner/.oci/config" > oracle-freetier-instance-creation-main/oci.env
          echo "OCT_FREE_AD=AD-1" >> oracle-freetier-instance-creation-main/oci.env
          echo "DISPLAY_NAME=my-arm-ubuntu-instance" >> oracle-freetier-instance-creation-main/oci.env
          echo "OCI_COMPUTE_SHAPE=VM.Standard.A1.Flex" >> oracle-freetier-instance-creation-main/oci.env
          echo "SECOND_MICRO_INSTANCE=False" >> oracle-freetier-instance-creation-main/oci.env
          echo "REQUEST_WAIT_TIME_SECS=60" >> oracle-freetier-instance-creation-main/oci.env
          echo "SSH_AUTHORIZED_KEYS_FILE=/home/runner/id_rsa.pub" >> oracle-freetier-instance-creation-main/oci.env
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}" >> oracle-freetier-instance-creation-main/oci.env
          echo "OCI_IMAGE_ID=" >> oracle-freetier-instance-creation-main/oci.env
          echo "OPERATING_SYSTEM=Canonical Ubuntu" >> oracle-freetier-instance-creation-main/oci.env
          echo "OS_VERSION=22.04" >> oracle-freetier-instance-creation-main/oci.env
          echo "ASSIGN_PUBLIC_IP=false" >> oracle-freetier-instance-creation-main/oci.env
          echo "BOOT_VOLUME_SIZE=50" >> oracle-freetier-instance-creation-main/oci.env
          echo "NOTIFY_EMAIL=False" >> oracle-freetier-instance-creation-main/oci.env
          echo "EMAIL=abc@gmail.com" >> oracle-freetier-instance-creation-main/oci.env
          echo "EMAIL_PASSWORD=" >> oracle-freetier-instance-creation-main/oci.env
          echo "DISCORD_WEBHOOK=" >> oracle-freetier-instance-creation-main/oci.env

      - name: Run script
        run: python oracle-freetier-instance-creation-main/main.py
